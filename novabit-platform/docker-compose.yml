services:
  postgres:
    image: postgres:17-alpine
    container_name: novabit-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: novabit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - novabit-postgres-data:/var/lib/postgresql/data

volumes:
  novabit-postgres-data:
