<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Not Found - Novabit Capital</title>
	<link rel="icon" href="temp/custom/img/novabit-symbol.png" type="image/png">

	<!-- Google font -->
	<link href="https://fonts.googleapis.com/css?family=Montserrat:700,900" rel="stylesheet">
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 2rem;
			font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
			color: #0f172a;
		}

		#notfound {
			width: min(100%, 40rem);
		}

		.notfound {
			background: rgba(255, 255, 255, 0.94);
			border: 1px solid #cbd5e1;
			border-radius: 24px;
			padding: 3rem 2rem;
			box-shadow: 0 24px 60px -32px rgba(15, 23, 42, 0.24);
			text-align: center;
		}

		.notfound-bg {
			display: none;
		}

		.notfound-404 h1 {
			margin: 0;
			font-size: clamp(4rem, 12vw, 7rem);
			line-height: 1;
			color: #2563eb;
		}

		h2 {
			margin: 1rem 0 0;
			font-size: 1.125rem;
			font-weight: 700;
			color: #334155;
		}

		.home-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			margin-top: 2rem;
			padding: 0.85rem 1.4rem;
			border-radius: 999px;
			background: #2563eb;
			color: #fff;
			font-weight: 700;
			text-decoration: none;
			transition: background-color 0.2s ease;
		}

		.home-btn:hover {
			background: #1d4ed8;
		}
	</style>
</head>

<body>
	<div id="notfound">
		<div class="notfound-bg"></div>
		<div class="notfound">
			<div class="notfound-404">
				<h1> 404 </h1>
			</div>
			<h2>We could not find the page you were looking for.</h2>
			<a href="register.html" class="home-btn">Go Back</a>
		</div>
	</div>
</body>
</html>
